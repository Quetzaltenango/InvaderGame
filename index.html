<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インベーダーゲーム</title>
<style>
  body { background: #222; text-align: center; color: white; font-family: sans-serif; }
  canvas { background: black; display: block; margin: 20px auto; border: 2px solid #555; }
</style>
</head>
<body>
  <h1>インベーダーゲーム</h1>
  <p>左右キー：移動 / スペースキー：ビーム</p>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 180, y: 350, w: 40, h: 20, speed: 5 };
    let bullets = [];
    let enemies = [];
    let keys = {};

    // 敵を配置
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 6; c++) {
        enemies.push({ x: 30 + c * 50, y: 30 + r * 40, w: 30, h: 20, active: true });
      }
    }

    document.addEventListener("keydown", (e) => keys[e.code] = true);
    document.addEventListener("keyup", (e) => keys[e.code] = false);

    function update() {
      // プレイヤーの移動
      if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
      if (keys["ArrowRight"] && player.x < canvas.width - player.w) player.x += player.speed;
      
      // ビーム発射
      if (keys["Space"]) {
        if (bullets.length === 0 || bullets[bullets.length - 1].y < 300) {
          bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10, speed: 7 });
        }
        keys["Space"] = false; 
      }

      // ビームの移動
      bullets.forEach((b, i) => {
        b.y -= b.speed;
        if (b.y < 0) bullets.splice(i, 1);
      });

      // 当たり判定
      bullets.forEach((b, bi) => {
        enemies.forEach((e) => {
          if (e.active && b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
            e.active = false;
            bullets.splice(bi, 1);
          }
        });
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // プレイヤーを描画（緑）
      ctx.fillStyle = "lime";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // ビームを描画（白）
      ctx.fillStyle = "white";
      bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

      // 敵を描画（赤）
      ctx.fillStyle = "red";
      let allCleared = true;
      enemies.forEach(e => {
        if (e.active) {
          ctx.fillRect(e.x, e.y, e.w, e.h);
          allCleared = false;
        }
      });

      if (allCleared) {
        ctx.fillStyle = "yellow";
        ctx.font = "30px sans-serif";
        ctx.fillText("クリア！", 140, 200);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
