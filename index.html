<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インベーダーゲーム - 完全版</title>
<style>
  body { background: #222; text-align: center; color: white; font-family: sans-serif; }
  canvas { background: black; display: block; margin: 20px auto; border: 2px solid #555; }
</style>
</head>
<body>
  <h1>インベーダーゲーム</h1>
  <p>上下左右キー：移動 / スペースキー：ビーム（ボス戦は長押しで貫通ビーム）</p>
  <canvas id="gameCanvas" width="1200" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 20, y: 190, w: 10, h: 20, hp: 10, speed: 5 };
    let bullets = [];
    let enemies = [];
    let walls = [];
    let safeWalls = [
      { x: 100, y: 80, w: 20, h: 60, hp: 10 },
      { x: 100, y: 260, w: 20, h: 60, hp: 10 }
    ];
    let keys = {};
    let prevSpace = false;
    let enemyDir = 1;
    let gameOver = false;
    let gameClear = false;

    // ボス戦用変数
    let isBossBattle = false;
    let chargeTime = 0;
    let bossOffsetX = 1200;
    let bossParts = [];
    let bossWalls = [];

    // 敵を100体（10列×10行）右側に配置
    for (let c = 0; c < 10; c++) {
      for (let r = 0; r < 10; r++) {
        enemies.push({ x: 800 + c * 30, y: 30 + r * 30, w: 15, h: 10, active: true });
      }
    }
    
    // 敵の壁を3列配置（動く壁、HP10）
    for (let c = 0; c < 3; c++) {
      for (let r = 0; r < 5; r++) {
        walls.push({ x: 500 + c * 80, y: 40 + r * 70, w: 20, h: 10, hp: 10, speed: 2 * (c % 2 === 0 ? 1 : -1) });
      }
    }

    const bossPattern = [
      "  W W W W W W W W  ",
      " W               W ",
      "W  OOO BBB JJJ    W",
      "W  O O B B   J    W",
      "W  O O BBB   J    W",
      "W  O O B B J J    W",
      "W  OOO BBB  JJ    W",
      " W               W ",
      "  W W W W W W W W  ",
      " W               W ",
      "W  OOO BBB JJJ    W",
      "W  O O B B   J    W",
      "W  O O BBB   J    W",
      "W  O O B B J J    W",
      "W  OOO BBB  JJ    W",
      " W               W ",
      "  W W W W W W W W  "
    ];

    function initBoss() {
      for (let r = 0; r < bossPattern.length; r++) {
        let rowStr = bossPattern[r];
        for (let c = 0; c < rowStr.length; c++) {
          let char = rowStr[c];
          let block = { r: r, c: c, w: 15, h: 15 };
          if (char === 'W') bossWalls.push(block);
          else if (char !== ' ') bossParts.push(block);
        }
      }
    }

    document.addEventListener("keydown", (e) => keys[e.code] = true);
    document.addEventListener("keyup", (e) => keys[e.code] = false);

    function rectIntersect(r1, r2) {
      return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
    }

    function update() {
      if (gameOver || gameClear) return;

      // プレイヤー移動（左側1/3のエリアのみ移動可能）
      if (keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
      if (keys["ArrowDown"] && player.y < canvas.height - player.h) player.y += player.speed;
      if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
      if (keys["ArrowRight"] && player.x < canvas.width / 3) player.x += player.speed;

      let activeCount = enemies.filter(e => e.active).length;

      // ボス戦移行チェック
      if (activeCount === 0 && !isBossBattle) {
        isBossBattle = true;
        initBoss();
        bullets = []; 
      }

      // ビーム発射制御
      if (!isBossBattle) {
        if (keys["Space"] && !prevSpace) {
          bullets.push({ x: player.x + player.w, y: player.y + player.h / 2 - 2, w: 8, h: 4, vx: 8, vy: 0 });
          if (activeCount <= 66) {
            bullets.push({ x: player.x + player.w, y: player.y + player.h / 2 - 2, w: 8, h: 4, vx: 8, vy: -4 });
          }
          if (activeCount <= 10) {
            bullets.push({ x: player.x + player.w, y: player.y + player.h / 2 - 2, w: 8, h: 4, vx: 8, vy: 4 });
          }
        }
      } else {
        if (keys["Space"]) {
          chargeTime++;
        } else if (prevSpace && !keys["Space"]) {
          if (chargeTime >= 180) { 
            bullets.push({ x: player.x + player.w, y: player.y - 5, w: 30, h: 30, vx: 10, vy: 0, isBig: true });
          } else {
            bullets.push({ x: player.x + player.w, y: player.y + player.h / 2 - 2, w: 8, h: 4, vx: 8, vy: 0 });
          }
          chargeTime = 0;
        }
      }
      prevSpace = keys["Space"];

      // 敵の移動速度計算
      let curSpeed = activeCount <= 10 ? 4 : activeCount <= 33 ? 3 : activeCount <= 66 ? 2 : 1;

      // ボス戦／通常戦の更新
      if (isBossBattle) {
        if (bossOffsetX > 800) bossOffsetX -= 2;
        
        let updateBossBlocks = (blocks) => {
          blocks.forEach(b => {
            b.x = bossOffsetX + b.c * 15;
            b.y = 10 + b.r * 22;
          });
        };
        updateBossBlocks(bossWalls);
        updateBossBlocks(bossParts);

        if (bossParts.length === 0 && bossOffsetX <= 800) {
          gameClear = true;
        }
      } else {
        let hitEdge = false;
        enemies.forEach(e => {
          if (e.active) {
            e.y += curSpeed * enemyDir;
            if (e.y < 0 || e.y + e.h > canvas.height) hitEdge = true;
            if (rectIntersect(e, player)) {
              player.hp -= 1;
              e.active = false;
              if (player.hp <= 0) gameOver = true;
            }
          }
        });
        if (hitEdge) {
          enemyDir *= -1;
          enemies.forEach(e => {
            if (e.active) {
              e.y += curSpeed * enemyDir;
              e.x -= 10;
            }
          });
        }
      }

      // 敵の壁の移動
      walls.forEach(w => {
        w.y += w.speed;
        if (w.y < 0 || w.y + w.h > canvas.height) w.speed *= -1;
      });

      // ビームの移動と当たり判定
      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;

        // 上下の枠で跳ね返る
        if (b.y <= 0 || b.y + b.h >= canvas.height) {
          b.vy *= -1;
          b.y = b.y <= 0 ? 1 : canvas.height - b.h - 1;
        }

        if (b.x < 0 || b.x > canvas.width) {
          bullets.splice(i, 1);
          continue;
        }

        // 安全地帯との判定（ダメージ処理）
        let hitSafeWall = false;
        if (b.isEnemyBullet) {
          for (let j = safeWalls.length - 1; j >= 0; j--) {
            let sw = safeWalls[j];
            if (!hitSafeWall && rectIntersect(b, sw)) {
              b.vx *= -1; 
              b.isEnemyBullet = false; 
              hitSafeWall = true;
              sw.hp -= 1;
              sw.w -= 2; 
              if (sw.hp <= 0) safeWalls.splice(j, 1);
            }
          }
        }
        if (hitSafeWall) continue;

        let hitWall = false;
        // 敵の壁との判定（ダメージ処理）
        for (let j = walls.length - 1; j >= 0; j--) {
          let w = walls[j];
          if (!hitWall && rectIntersect(b, w)) {
            if (b.isBig) {
              walls.splice(j, 1); 
            } else {
              b.vx *= -1;
              b.isEnemyBullet = true;
              hitWall = true;
              w.hp -= 1;
              w.w -= 2; // 1ダメージごとに削る
              if (w.hp <= 0) walls.splice(j, 1);
            }
          }
        }
        if (hitWall) continue;

        if (isBossBattle) {
          // ボスの壁との判定
          for (let j = bossWalls.length - 1; j >= 0; j--) {
            if (rectIntersect(b, bossWalls[j])) {
              if (b.isBig) {
                bossWalls.splice(j, 1); 
              } else {
                b.vx *= -1;
                b.isEnemyBullet = true;
                hitWall = true;
              }
              break; 
            }
          }
          if (hitWall) continue;

          // ボス本体（OBJ）との判定
          if (!b.isEnemyBullet) {
            for (let j = bossParts.length - 1; j >= 0; j--) {
              if (rectIntersect(b, bossParts[j])) {
                bossParts.splice(j, 1);
                if (!b.isBig) bullets.splice(i, 1); 
                break;
              }
            }
          }
        } else {
          // 通常の敵との判定
          let hitEnemy = false;
          enemies.forEach(e => {
            if (e.active && !b.isEnemyBullet && rectIntersect(b, e)) {
              e.active = false;
              if (!b.isBig) {
                bullets.splice(i, 1);
                hitEnemy = true;
              }
            }
          });
          if (hitEnemy) continue;
        }

        // プレイヤー被弾判定
        if (b.isEnemyBullet && rectIntersect(b, player)) {
          player.hp -= 1;
          bullets.splice(i, 1);
          if (player.hp <= 0) gameOver = true;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 安全地帯（緑）
      ctx.fillStyle = "lime";
      safeWalls.forEach(sw => ctx.fillRect(sw.x, sw.y, sw.w, sw.h));

      // プレイヤー（緑）
      ctx.fillStyle = "lime";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // HP・チャージ表示
      ctx.fillStyle = "white";
      ctx.font = "16px sans-serif";
      ctx.fillText(`HP: ${player.hp}`, 10, 20);
      if (isBossBattle) {
        let chargePercent = Math.min(100, Math.floor((chargeTime / 180) * 100));
        ctx.fillStyle = chargePercent === 100 ? "yellow" : "white";
        ctx.fillText(`CHARGE: ${chargePercent}%`, 100, 20);
      } else {
        let activeCount = enemies.filter(e => e.active).length;
        ctx.fillText(`ENEMY: ${activeCount}`, 100, 20);
      }

      // ビーム
      bullets.forEach(b => {
        if (b.isBig) ctx.fillStyle = "cyan";
        else ctx.fillStyle = b.isEnemyBullet ? "orange" : "white";
        ctx.fillRect(b.x, b.y, b.w, b.h);
      });

      // 敵の壁（青）
      ctx.fillStyle = "cyan";
      walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

      if (isBossBattle) {
        // ボス壁（青紫）
        ctx.fillStyle = "#8a2be2";
        bossWalls.forEach(bw => ctx.fillRect(bw.x, bw.y, bw.w, bw.h));
        // ボス本体（赤）
        ctx.fillStyle = "red";
        bossParts.forEach(bp => ctx.fillRect(bp.x, bp.y, bp.w, bp.h));
      } else {
        // 敵（赤）
        ctx.fillStyle = "red";
        enemies.forEach(e => {
          if (e.active) ctx.fillRect(e.x, e.y, e.w, e.h);
        });
      }

      if (gameClear) {
        ctx.fillStyle = "yellow";
        ctx.font = "40px sans-serif";
        ctx.fillText("ALL CLEAR!!", canvas.width / 2 - 120, 200);
      } else if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px sans-serif";
        ctx.fillText("GAME OVER", canvas.width / 2 - 120, 200);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
